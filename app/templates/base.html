<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Gaming Tournaments{% endblock %}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #0f0f1a; color: #e0e0e0; }
    nav {
      background: #1a1a2e; padding: 0.8rem 2rem;
      display: flex; gap: 2rem; align-items: center;
      border-bottom: 2px solid #7b2ff7;
    }
    .brand { color: #7b2ff7; font-size: 1.1rem; font-weight: bold; }
    nav a { color: #a78bfa; text-decoration: none; font-weight: 600; font-size: 0.95rem; }
    nav a:hover { color: #c4b5fd; }
    .container { max-width: 1100px; margin: 2rem auto; padding: 0 1.5rem; }
    h1 { color: #a78bfa; margin-bottom: 1rem; font-size: 1.6rem; }
    h2 { color: #c4b5fd; margin: 1.5rem 0 0.6rem; font-size: 1.2rem; }
    h3 { color: #d8b4fe; margin: 1rem 0 0.4rem; font-size: 1rem; }
    table { width: 100%; border-collapse: collapse; margin: 0.5rem 0 1rem; }
    th {
      background: #1a1a2e; color: #a78bfa;
      padding: 0.55rem 1rem; text-align: left; font-size: 0.9rem;
    }
    td { padding: 0.45rem 1rem; border-bottom: 1px solid #2a2a3e; font-size: 0.9rem; }
    tr:hover td { background: #16213e; }
    .card {
      background: #1a1a2e; border-radius: 8px;
      padding: 1rem 1.2rem; margin-bottom: 1rem;
      border: 1px solid #2a2a3e;
    }
    form { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: flex-end; margin-bottom: 1rem; }
    label { display: block; font-size: 0.82rem; color: #a78bfa; margin-bottom: 3px; }
    select, input[type="text"] {
      background: #2a2a3e; color: #e0e0e0;
      border: 1px solid #7b2ff7; padding: 0.4rem 0.6rem;
      border-radius: 4px; font-size: 0.9rem;
    }
    button, input[type="submit"] {
      background: #7b2ff7; color: white;
      border: none; padding: 0.4rem 1.1rem;
      border-radius: 4px; cursor: pointer; font-size: 0.9rem;
    }
    button:hover, input[type="submit"]:hover { background: #5b0fd7; }
    .badge {
      display: inline-block; background: #7b2ff7; color: white;
      border-radius: 4px; padding: 1px 7px; font-size: 0.78rem;
    }
    .badge-green  { background: #15803d; }
    .badge-yellow { background: #b45309; }
    .alert-ok  { background: #14532d; color: #86efac; padding: 0.8rem 1rem; border-radius: 6px; margin-bottom: 1rem; }
    .alert-err { background: #7f1d1d; color: #fca5a5; padding: 0.8rem 1rem; border-radius: 6px; margin-bottom: 1rem; }
    a { color: #a78bfa; }
    a:hover { color: #c4b5fd; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 700px) { .grid-2 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<nav>
  <span class="brand">&#127918; Gaming Tournaments</span>
  <a href="/torneos">Torneos</a>
  <a href="/estadisticas">Estadísticas</a>
  <a href="/busqueda">Búsqueda</a>
  <a href="/sponsors">Sponsors</a>
  <a href="/inscripcion">Inscripción</a>
</nav>
<div class="container">
  {% block content %}{% endblock %}
</div>
</body>
</html>
